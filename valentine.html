<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #4a1942 40%, #7b1450 70%, #1a0a2e 100%);
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(218, 165, 32, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 0, 139, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Royal ornate border */
        .hearts-bg::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 3px solid rgba(218, 165, 32, 0.4);
            border-radius: 20px;
            box-shadow: 
                inset 0 0 30px rgba(218, 165, 32, 0.2),
                0 0 30px rgba(218, 165, 32, 0.1);
        }

        .heart {
            position: absolute;
            font-size: 25px;
            opacity: 0.15;
            animation: float 20s infinite;
            filter: drop-shadow(0 0 5px rgba(218, 165, 32, 0.3));
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Pages */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 1;
        }

        .page.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        /* Welcome Page */
        #welcome h1 {
            font-size: 4.5rem;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #daa520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(218, 165, 32, 0.5);
            margin-bottom: 2rem;
            animation: royalGlow 3s ease-in-out infinite;
            letter-spacing: 2px;
            font-weight: bold;
        }

        @keyframes royalGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(218, 165, 32, 0.6))
                        drop-shadow(0 0 40px rgba(218, 165, 32, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(218, 165, 32, 0.8))
                        drop-shadow(0 0 60px rgba(218, 165, 32, 0.5));
            }
        }

        /* Question Page */
        #question-intro p {
            font-size: 2.8rem;
            color: #f5f5f5;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5), 0 0 20px rgba(218, 165, 32, 0.3);
            font-style: italic;
            letter-spacing: 1px;
        }

        /* Main Question Page */
        #main-question h2 {
            font-size: 3.8rem;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #daa520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(218, 165, 32, 0.5));
            margin-bottom: 4rem;
            text-align: center;
            padding: 0 2rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .button-container {
            display: flex;
            gap: 3rem;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Buttons */
        button {
            padding: 1.5rem 4rem;
            font-size: 1.8rem;
            border: 2px solid rgba(218, 165, 32, 0.5);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-weight: bold;
            transition: all 0.4s ease;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        #ask-btn {
            background: linear-gradient(135deg, #daa520 0%, #ffd700 50%, #b8860b 100%);
            color: #1a0a2e;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
        }

        #ask-btn:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 15px 50px rgba(218, 165, 32, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(218, 165, 32, 0.8);
        }

        #yes-btn {
            background: linear-gradient(135deg, #daa520 0%, #ffd700 50%, #b8860b 100%);
            color: #1a0a2e;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
            position: static;
        }

        #yes-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 15px 50px rgba(218, 165, 32, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(218, 165, 32, 0.8);
        }

        #no-btn {
            background: linear-gradient(135deg, #4a1942 0%, #6b1450 50%, #3a0f32 100%);
            color: #daa520;
            position: static;
            border-color: rgba(218, 165, 32, 0.4);
        }
        
        #no-btn:hover {
            border-color: rgba(218, 165, 32, 0.6);
        }

        /* Final Page */
        #final-page h2 {
            font-size: 3.8rem;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #daa520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(218, 165, 32, 0.6));
            text-align: center;
            padding: 0 2rem;
            line-height: 1.4;
            animation: fadeInScale 1s ease-out;
            letter-spacing: 2px;
            font-weight: bold;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
            box-shadow: 0 0 10px #ffd700;
        }

        @keyframes sparkle {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #welcome h1 {
                font-size: 2.5rem;
            }
            
            #question-intro p,
            #main-question h2,
            #final-page h2 {
                font-size: 2rem;
            }
            
            button {
                padding: 1rem 2.5rem;
                font-size: 1.3rem;
            }
            
            .button-container {
                gap: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating hearts background -->
    <div class="hearts-bg" id="hearts-bg"></div>

    <!-- Page 1: Welcome -->
    <div class="page active" id="welcome">
        <h1>Welcome 👑</h1>
    </div>

    <!-- Page 2: Question Intro -->
    <div class="page" id="question-intro">
        <p>I have a question? 🌹</p>
        <button id="ask-btn">Ask</button>
    </div>

    <!-- Page 3: Main Question -->
    <div class="page" id="main-question">
        <h2>Will you be my Valentine? 💕</h2>
        <div class="button-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <!-- Page 4: Final Page -->
    <div class="page" id="final-page">
        <h2>Thought so, Thanks!! 💖<br>See you soon... ✨</h2>
    </div>

    <script>
        // Create floating hearts
        function createHearts() {
            const heartsContainer = document.getElementById('hearts-bg');
            const royalSymbols = ['👑', '💎', '✨', '⭐', '🌟', '💫', '♔', '♕'];
            
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = royalSymbols[Math.floor(Math.random() * royalSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 20 + 's';
                heart.style.fontSize = (Math.random() * 15 + 20) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        createHearts();

        // Page transitions
        let currentPage = 0;
        const pages = ['welcome', 'question-intro', 'main-question', 'final-page'];

        function showPage(index) {
            pages.forEach((pageId, i) => {
                const page = document.getElementById(pageId);
                if (i === index) {
                    page.classList.add('active');
                } else {
                    page.classList.remove('active');
                }
            });
        }

        // Auto transition from welcome to question-intro
        setTimeout(() => {
            currentPage = 1;
            showPage(currentPage);
        }, 2500);

        // Ask button
        document.getElementById('ask-btn').addEventListener('click', function(e) {
            createSparkles(e);
            setTimeout(() => {
                currentPage = 2;
                showPage(currentPage);
            }, 300);
        });

        // Yes button
        document.getElementById('yes-btn').addEventListener('click', function(e) {
            createSparkles(e);
            setTimeout(() => {
                currentPage = 3;
                showPage(currentPage);
                celebrate();
            }, 300);
        });

        // No button - moves away
        const noBtn = document.getElementById('no-btn');
        const buttonContainer = document.querySelector('.button-container');
        let isNoBtnAbsolute = false;

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        function moveNoButton() {
            // Make button absolute on first hover
            if (!isNoBtnAbsolute) {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'absolute';
                noBtn.style.left = rect.left + 'px';
                noBtn.style.top = rect.top + 'px';
                isNoBtnAbsolute = true;
            }
            
            const container = document.getElementById('main-question');
            const containerRect = container.getBoundingClientRect();
            
            // Random position within viewport
            const newLeft = Math.random() * (containerRect.width - 200) + containerRect.left;
            const newTop = Math.random() * (containerRect.height - 100) + containerRect.top + 100;
            
            noBtn.style.left = newLeft + 'px';
            noBtn.style.top = newTop + 'px';
            noBtn.style.transform = 'translate(0, 0)';
        }

        // Sparkle effect
        function createSparkles(e) {
            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                
                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200;
                sparkle.style.setProperty('--tx', tx + 'px');
                sparkle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        // Celebration effect
        function celebrate() {
            const colors = ['#ffd700', '#daa520', '#8b1538', '#4a1942', '#b8860b', '#ffffff'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.width = '12px';
                    confetti.style.height = '12px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.borderRadius = '50%';
                    confetti.style.pointerEvents = 'none';
                    confetti.style.zIndex = '1000';
                    confetti.style.boxShadow = `0 0 10px ${colors[Math.floor(Math.random() * colors.length)]}`;
                    
                    document.body.appendChild(confetti);
                    
                    const animation = confetti.animate([
                        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                        { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                    ], {
                        duration: 3000 + Math.random() * 2000,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                    });
                    
                    animation.onfinish = () => confetti.remove();
                }, i * 30);
            }
        }
    </script>
</body>
</html>
